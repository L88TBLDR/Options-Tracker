  --neg: #F09595;
  --blue: #85B7EB;
  --amber: #EF9F27;
  --purple: #AFA9EC;
  --teal: #5DCAA5;
  --coral: #F0997B;
  --radius: 10px;
  --radius-lg: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(80px + var(--safe-bottom)); }
.header { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: calc(var(--safe-top) + 12px) 16px 12px; position: sticky; top: 0; z-index: 50; }
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; z-index: 50; padding-bottom: var(--safe-bottom); }
.nav-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; color: var(--text2); font-size: 10px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn.active { color: var(--blue); }
.nav-btn svg { width: 22px; height: 22px; }
.panel { display: none; padding: 16px; }
.panel.active { display: block; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric { background: var(--card); border-radius: var(--radius); padding: 12px; }
.metric-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.metric-value { font-size: 20px; font-weight: 600; }
.metric-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
.pos { color: var(--pos); }
.neg { color: var(--neg); }
.card { background: var(--card); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; border: 0.5px solid var(--border); }
.card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
.chart-wrap { position: relative; width: 100%; height: 180px; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; }
input, select { font-size: 15px; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg3); color: var(--text); width: 100%; -webkit-appearance: none; appearance: none; }
input:focus, select:focus { outline: none; border-color: var(--blue); }
input[readonly] { background: var(--bg2); color: var(--text2); }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; border-radius: var(--radius); cursor: pointer; border: none; background: var(--blue); color: #0a1628; margin-top: 4px; }
.btn:active { opacity: .8; }
.btn-ghost { background: var(--card); border: 0.5px solid var(--border2); color: var(--text); margin-top: 8px; }
.btn-sm { padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 8px; border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); cursor: pointer; }
.btn-del { color: var(--neg); border-color: rgba(240,149,149,0.3); background: rgba(240,149,149,0.08); }
.trade-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.trade-row:last-child { border-bottom: none; }
.trade-left { flex: 1; }
.trade-ticker { font-size: 14px; font-weight: 600; }
.trade-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.trade-right { text-align: right; }
.trade-pnl { font-size: 14px; font-weight: 600; }
.trade-outcome { font-size: 11px; color: var(--text2); margin-top: 2px; }
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; margin-right: 4px; }
.b-csp { background: rgba(133,183,235,0.15); color: #85B7EB; }
.b-cc { background: rgba(93,202,165,0.15); color: #5DCAA5; }
.b-diag { background: rgba(175,169,236,0.15); color: #AFA9EC; }
.b-stock { background: rgba(144,144,168,0.15); color: #9090a8; }
.b-other { background: rgba(239,159,39,0.15); color: #EF9F27; }
.b-open { background: rgba(239,159,39,0.15); color: #EF9F27; }
.b-closed { background: rgba(93,202,165,0.15); color: #5DCAA5; }
.b-expired { background: rgba(144,144,168,0.15); color: #9090a8; }
.b-assigned { background: rgba(240,149,149,0.15); color: #F09595; }
.b-sold { background: rgba(144,144,168,0.15); color: #9090a8; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 13px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.filter-row select { width: auto; font-size: 12px; padding: 7px 10px; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; margin-top: 16px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.stat-row:last-child { border-bottom: none; }
.stat-nums { display: flex; gap: 16px; }
.stat-num { text-align: right; }
.stat-num-label { font-size: 10px; color: var(--text2); }
.stat-num-val { font-size: 13px; font-weight: 600; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: flex-end; }
.modal-bg.show { display: flex; }
.modal { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; border-top: 0.5px solid var(--border2); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.dte-warning { color: var(--neg); font-size: 12px; }
.pnl-total-bar { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; border: 0.5px solid var(--border); }
</style>
</head>

<div id="analytics" class="panel">

  {id:14,ticker:'PLTR',type:'CSP',openDate:'2026-04-10',expiry:'2026-05-15',strike:95,premium:1.63,contracts:1,underlying:0,iv:82.7,delta:-0.095,dte:35,notes:'',totalCredit:163,status:'open',closedDate:null,closeCost:0,outcome:null,pnl:null},

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function load() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) { state = JSON.parse(r); }
    else { state = {trades: SEED, nextId: 15}; save(); }
  } catch(e) { state = {trades: SEED, nextId: 15}; }
}

function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'analytics') renderAnalytics();
  if (name === 'positions') { updateFilters(); renderPositions(); }
  if (name === 'history') { updateFilters(); renderHistory(); }
}

function calcDTE(expiry, from) {
  if (!expiry) return 0;
  const e = new Date(expiry), f = from ? new Date(from) : new Date();
  return Math.max(0, Math.round((e - f) / 86400000));
}

function capEff(t) {
  if (t.type === 'Stock Sale' || !t.pnl) return null;
  const cap = t.strike * t.contracts * 100;
  return cap > 0 ? (t.pnl / cap) * 100 : null;
}

function aroc(t) {
  const ce = capEff(t);
  if (ce === null || !t.dte || t.dte === 0) return null;
  return (ce / t.dte) * 365;
}

function badgeClass(type) {
  if (type === 'CSP') return 'b-csp';
  if (type === 'CC') return 'b-cc';
  if (type === 'Diagonal') return 'b-diag';
  if (type === 'Stock Sale') return 'b-stock';
  return 'b-other';
}

function outcomeClass(o) {
  if (o === 'Expired') return 'b-expired';
  if (o === 'Assigned') return 'b-assigned';
  if (o === 'Sold') return 'b-sold';
  return 'b-closed';
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

const C = {
  grid: 'rgba(255,255,255,0.07)',
  text: '#6a6a88',
  pos: '#5DCAA5',
  neg: '#F09595',
  blue: '#85B7EB',
  amber: '#EF9F27',
  purple: '#AFA9EC',
  teal: '#5DCAA5',
  coral: '#F0997B',
};

function renderDashboard() {
  const open = state.trades.filter(t => t.status === 'open');
  const closed = state.trades.filter(t => t.status === 'closed');
  const opts = closed.filter(t => t.type !== 'Stock Sale');
  const totalPnl = closed.reduce((s,t) => s + (t.pnl||0), 0);
  const wins = opts.filter(t => (t.pnl||0) > 0).length;
  const wr = opts.length ? Math.round(wins / opts.length * 100) : 0;
  const openCred = open.reduce((s,t) => s + t.totalCredit, 0);
  const capRisk = opts.reduce((s,t) => s + t.strike * t.contracts * 100, 0);
  const capEffTotal = capRisk > 0 ? (opts.reduce((s,t) => s + (t.pnl||0), 0) / capRisk * 100).toFixed(2) : 0;

  document.getElementById('header-sub').textContent = `${opts.length} trades · ${open.length} open`;
  document.getElementById('header-badge').textContent = `+$${totalPnl.toFixed(0)}`;

  document.getElementById('sum-cards').innerHTML = `
    <div class="metric"><div class="metric-label">Total P&L</div><div class="metric-value ${totalPnl>=0?'pos':'neg'}">$${totalPnl.toFixed(2)}</div><div class="metric-sub">${closed.length} closed</div></div>
    <div class="metric"><div class="metric-label">Win rate</div><div class="metric-value">${wr}%</div><div class="metric-sub">${wins}W / ${opts.length-wins}L</div></div>
    <div class="metric"><div class="metric-label">Open credit</div><div class="metric-value pos">$${openCred.toFixed(0)}</div><div class="metric-sub">${open.length} positions</div></div>
    <div class="metric"><div class="metric-label">Cap eff</div><div class="metric-value pos">${capEffTotal}%</div><div class="metric-sub">vs capital at risk</div></div>
  `;

  const sc = [...closed].filter(t=>t.closedDate).sort((a,b) => new Date(a.closedDate) - new Date(b.closedDate));
  let run = 0;
  const pnlLabels = sc.map(t => t.closedDate.slice(5));
  const pnlData = sc.map(t => { run += t.pnl||0; return +run.toFixed(2); });
  destroyChart('pnl');
  if (pnlData.length) {
    charts['pnl'] = new Chart(document.getElementById('chart-pnl'), {
      type: 'line',
      data: {labels: pnlLabels, datasets: [{data: pnlData, borderColor: C.pos, backgroundColor: 'transparent', pointRadius: 2, pointBackgroundColor: C.pos, tension: 0.3, borderWidth: 2}]},
      options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}}, scales:{x:{ticks:{color:C.text,font:{size:9},maxTicksLimit:8},grid:{color:C.grid}},y:{ticks:{color:C.text,font:{size:10},callback:v=>'$'+v},grid:{color:C.grid}}}}
    });
  }

  const outcomes = {};
  closed.forEach(t => { if(t.outcome) outcomes[t.outcome] = (outcomes[t.outcome]||0)+1; });
  const outKeys = Object.keys(outcomes).filter(k => outcomes[k] > 0);
  const outColors = ['#85B7EB','#5DCAA5','#F09595','#9090a8'];
  document.getElementById('leg-outcome').innerHTML = outKeys.map((k,i) => `<span><span class="legend-dot" style="background:${outColors[i%4]}"></span>${k} ${outcomes[k]}</span>`).join('');
  destroyChart('outcome');
  if (outKeys.length) {
    charts['outcome'] = new Chart(document.getElementById('chart-outcome'), {
      type: 'doughnut',
      data: {labels: outKeys, datasets: [{data: outKeys.map(k=>outcomes[k]), backgroundColor: outColors.slice(0,outKeys.length), borderWidth: 0, hoverOffset: 4}]},
      options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed}}}}
    });
  }

  document.getElementById('dash-open').innerHTML = open.length ? open.map(t => {
    const dl = t.expiry ? calcDTE(t.expiry) : '-';
    return `<div class="trade-row">
      <div class="trade-left"><div class="trade-ticker"><span class="badge ${badgeClass(t.type)}">${t.type}</span>${t.ticker}</div>
      <div class="trade-meta">Strike ${t.strike} · ${typeof dl==='number'?dl+'d left':'-'}</div></div>
      <div class="trade-right"><div class="trade-pnl pos">+$${t.totalCredit}</div><div class="trade-outcome"><span class="badge b-open">Open</span></div></div></div>`;
  }).join('') : '<div class="empty">No open positions</div>';
}

function renderAnalytics() {
  const closed = state.trades.filter(t => t.status === 'closed');
  const open = state.trades.filter(t => t.status === 'open');
  const opts = closed.filter(t => t.type !== 'Stock Sale');

  const totalPnl = opts.reduce((s,t) => s+(t.pnl||0), 0);
  const totalCred = opts.reduce((s,t) => s+t.totalCredit, 0);
  const premEff = totalCred > 0 ? ((totalPnl/totalCred)*100).toFixed(1) : 0;
  const capRisk = opts.reduce((s,t) => s + t.strike*t.contracts*100, 0);
  const capEffTotal = capRisk > 0 ? ((totalPnl/capRisk)*100).toFixed(2) : 0;
  const arocsV = opts.filter(t=>t.dte>0).map(t=>aroc(t)).filter(v=>v!==null);
  const avgAroc = arocsV.length ? (arocsV.reduce((s,v)=>s+v,0)/arocsV.length).toFixed(1) : 0;
  const avgDTE = opts.length ? Math.round(opts.reduce((s,t)=>s+t.dte,0)/opts.length) : 0;

  document.getElementById('ana-cards').innerHTML = `
    <div class="metric"><div class="metric-label">Prem efficiency</div><div class="metric-value">${premEff}%</div><div class="metric-sub">realized ÷ collected</div></div>
    <div class="metric"><div class="metric-label">Cap efficiency</div><div class="metric-value pos">${capEffTotal}%</div><div class="metric-sub">P&L ÷ capital at risk</div></div>
    <div class="metric"><div class="metric-label">Avg AROC</div><div class="metric-value pos">${avgAroc}%</div><div class="metric-sub">annualized ROC</div></div>
    <div class="metric"><div class="metric-label">Avg DTE open</div><div class="metric-value">${avgDTE}d</div><div class="metric-sub">options only</div></div>
  `;

  const tickers = [...new Set(opts.map(t=>t.ticker))];
  const tColors = [C.blue, C.teal, C.amber, C.coral, C.purple];

  document.getElementById('cap-eff-rows').innerHTML = tickers.map((tk,i) => {
    const tc = opts.filter(t=>t.ticker===tk);
    const pl = tc.reduce((s,t)=>s+(t.pnl||0),0);
    const cap = tc.reduce((s,t)=>s+t.strike*t.contracts*100,0);
    const ce = cap>0 ? ((pl/cap)*100).toFixed(2) : '-';
    const pe = tc.reduce((s,t)=>s+t.totalCredit,0);
    const peff = pe>0 ? ((pl/pe)*100).toFixed(1) : '-';
    const ar = tc.filter(t=>t.dte>0).map(t=>aroc(t)).filter(v=>v!==null);
    const avgA = ar.length ? (ar.reduce((s,v)=>s+v,0)/ar.length).toFixed(1) : '-';
    return `<div class="stat-row">
      <div style="font-size:14px;font-weight:600;color:${tColors[i%5]}">${tk}</div>
      <div class="stat-nums">
        <div class="stat-num"><div class="stat-num-label">Cap eff</div><div class="stat-num-val ${parseFloat(ce)>=0?'pos':'neg'}">${ce}%</div></div>
        <div class="stat-num"><div class="stat-num-label">Prem eff</div><div class="stat-num-val">${peff}%</div></div>
        <div class="stat-num"><div class="stat-num-label">AROC</div><div class="stat-num-val pos">${avgA}%</div></div>
      </div></div>`;
  }).join('') || '<div class="empty">No data</div>';

  const tickerPnl = tickers.map(tk => +closed.filter(t=>t.ticker===tk).reduce((s,t)=>s+(t.pnl||0),0).toFixed(2));
  document.getElementById('leg-ticker').innerHTML = tickers.map((tk,i)=>`<span><span class="legend-dot" style="background:${tColors[i%5]}"></span>${tk}</span>`).join('');
  destroyChart('ticker');
  if (tickers.length) {
    charts['ticker'] = new Chart(document.getElementById('chart-ticker'), {
      type:'bar', data:{labels:tickers, datasets:[{data:tickerPnl, backgroundColor:tickerPnl.map(v=>v>=0?C.pos+'99':C.neg+'99'), borderColor:tickerPnl.map(v=>v>=0?C.pos:C.neg), borderWidth:1}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}},scales:{x:{ticks:{color:C.text,font:{size:12}},grid:{display:false}},y:{ticks:{color:C.text,font:{size:10},callback:v=>'$'+v},grid:{color:C.grid}}}}
    });
  }

  const allT = [...closed,...open];
  const typeCount = {};
  allT.forEach(t => typeCount[t.type] = (typeCount[t.type]||0)+1);
  const typeKeys = Object.keys(typeCount);
  const tcc = [C.blue,C.teal,C.amber,C.coral,C.purple,'#97C459'];
  document.getElementById('leg-strategy').innerHTML = typeKeys.map((k,i)=>`<span><span class="legend-dot" style="background:${tcc[i%6]}"></span>${k} ${typeCount[k]}</span>`).join('');
  destroyChart('strategy');
  if (typeKeys.length) {
    charts['strategy'] = new Chart(document.getElementById('chart-strategy'), {
      type:'doughnut', data:{labels:typeKeys,datasets:[{data:typeKeys.map(k=>typeCount[k]),backgroundColor:tcc.slice(0,typeKeys.length),borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed}}}}
    });
  }

  const mm = {};
  closed.forEach(t => { const m = t.closedDate?t.closedDate.slice(0,7):'?'; mm[m]=(mm[m]||0)+(t.pnl||0); });
  const months = Object.keys(mm).sort();
  const mPnl = months.map(m => +mm[m].toFixed(2));
  destroyChart('monthly');
  if (months.length) {
    charts['monthly'] = new Chart(document.getElementById('chart-monthly'), {
      type:'bar', data:{labels:months,datasets:[{data:mPnl,backgroundColor:mPnl.map(v=>v>=0?C.pos+'99':C.neg+'99'),borderColor:mPnl.map(v=>v>=0?C.pos:C.neg),borderWidth:1}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}},scales:{x:{ticks:{color:C.text,font:{size:10},autoSkip:false,maxRotation:45},grid:{display:false}},y:{ticks:{color:C.text,font:{size:10},callback:v=>'$'+v},grid:{color:C.grid}}}}
    });
  }
}

function toggleFields() {
  const t = document.getElementById('f-type').value;
  const isStock = t === 'Stock Sale';
  document.getElementById('f-expiry-wrap').style.display = isStock ? 'none' : '';
  document.getElementById('f-greeks-row').style.display = isStock ? 'none' : '';
  document.getElementById('f-calc-row').style.display = isStock ? 'none' : '';
}

document.getElementById('f-expiry').addEventListener('change', function() {
  const open = document.getElementById('f-open-date').value || new Date().toISOString().slice(0,10);
  document.getElementById('f-dte').value = calcDTE(this.value, open);
  const p = parseFloat(document.getElementById('f-premium').value)||0;
  const c = parseInt(document.getElementById('f-contracts').value)||1;
  document.getElementById('f-maxp').value = (p*c*100).toFixed(2);
});

function logTrade() {
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  const type = document.getElementById('f-type').value;
  const openDate = document.getElementById('f-open-date').value;
  if (!ticker || !openDate) { alert('Ticker and open date required.'); return; }
  const expiry = type === 'Stock Sale' ? null : document.getElementById('f-expiry').value;
  const strike = parseFloat(document.getElementById('f-strike').value)||0;
  const premium = parseFloat(document.getElementById('f-premium').value)||0;
  const contracts = parseInt(document.getElementById('f-contracts').value)||1;
  const dte = expiry ? calcDTE(expiry, openDate) : 0;
  const trade = {
    id: state.nextId++, ticker, type, openDate, expiry, strike, premium, contracts,
    underlying: 0,
    iv: parseFloat(document.getElementById('f-iv').value)||0,
    delta: parseFloat(document.getElementById('f-delta').value)||0,
    dte, notes: document.getElementById('f-notes').value,
    totalCredit: type==='Stock Sale' ? +(premium*contracts).toFixed(2) : +(premium*contracts*100).toFixed(2),
    status:'open', closedDate:null, closeCost:0, outcome:null, pnl:null
  };
  state.trades.unshift(trade);
  save(); clearForm(); updateFilters(); switchTab('positions');
}

function clearForm() {
  ['f-ticker','f-strike','f-premium','f-iv','f-delta','f-dte','f-maxp','f-notes','f-open-date','f-expiry'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-contracts').value = 1;
}

function showClose(id) {
  document.getElementById('cm-id').value = id;
  document.getElementById('cm-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('cm-cost').value = 0;
  document.getElementById('close-modal').classList.add('show');
}
function hideModal() { document.getElementById('close-modal').classList.remove('show'); }

function confirmClose() {
  const id = parseInt(document.getElementById('cm-id').value);
  const t = state.trades.find(x => x.id===id); if (!t) return;
  const cc2 = parseFloat(document.getElementById('cm-cost').value)||0;
  t.status='closed'; t.closedDate=document.getElementById('cm-date').value;
  t.outcome=document.getElementById('cm-outcome').value; t.closeCost=cc2;
  t.pnl = +(t.totalCredit - (cc2*t.contracts*100)).toFixed(2);
  save(); hideModal(); renderPositions(); renderDashboard();
}

function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  state.trades = state.trades.filter(x => x.id!==id);
  save(); renderPositions();
}

function updateFilters() {
  const tickers = [...new Set(state.trades.map(t=>t.ticker))];
  ['pf-ticker','hf-ticker'].forEach(sid => {
    const sel = document.getElementById(sid); const cur = sel.value;
    sel.innerHTML = '<option value="">All tickers</option>';
    tickers.forEach(tk => { const o = document.createElement('option'); o.value=tk; o.textContent=tk; sel.appendChild(o); });
    if (tickers.includes(cur)) sel.value = cur;
  });
}

function renderPositions() {
  const tf = document.getElementById('pf-ticker').value;
  const tyf = document.getElementById('pf-type').value;
  let trades = state.trades.filter(t=>t.status==='open');
  if (tf) trades = trades.filter(t=>t.ticker===tf);
  if (tyf) trades = trades.filter(t=>t.type===tyf);
  const el = document.getElementById('positions-list');
  if (!trades.length) { el.innerHTML='<div class="empty">No open positions</div>'; return; }
  el.innerHTML = '<div class="card">' + trades.map(t => {
    const dl = t.expiry ? calcDTE(t.expiry) : '-';
    const warn = typeof dl==='number' && dl<=7;
    return `<div class="trade-row">
      <div class="trade-left">
        <div class="trade-ticker"><span class="badge ${badgeClass(t.type)}">${t.type}</span>${t.ticker}</div>
        <div class="trade-meta">Strike $${t.strike} · ${t.iv?t.iv+'% IV · ':''}${typeof dl==='number'?`<span class="${warn?'dte-warning':''}">${dl}d left</span>`:'-'}</div>
        ${t.notes?`<div class="trade-meta" style="margin-top:2px;font-style:italic">${t.notes}</div>`:''}
      </div>
      <div class="trade-right">
        <div class="trade-pnl pos">+$${t.totalCredit}</div>
        <div style="display:flex;gap:4px;margin-top:4px;justify-content:flex-end">
          <button class="btn-sm" onclick="showClose(${t.id})">Close</button>
          <button class="btn-sm btn-del" onclick="deleteTrade(${t.id})">Del</button>
        </div>
      </div></div>`;
  }).join('') + '</div>';
}

function renderHistory() {
  const tf = document.getElementById('hf-ticker').value;
  const of2 = document.getElementById('hf-outcome').value;
  let trades = state.trades.filter(t=>t.status==='closed');
  if (tf) trades = trades.filter(t=>t.ticker===tf);
  if (of2) trades = trades.filter(t=>t.outcome===of2);

  const totalPnl = trades.reduce((s,t)=>s+(t.pnl||0),0);
  document.getElementById('pnl-total-bar').innerHTML = `
    <div style="font-size:12px;color:var(--text2)">Filtered P&L</div>
    <div style="font-size:18px;font-weight:700" class="${totalPnl>=0?'pos':'neg'}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</div>`;

  const el = document.getElementById('history-list');
  if (!trades.length) { el.innerHTML='<div class="empty">No closed trades</div>'; return; }
  el.innerHTML = '<div class="card">' + trades.map(t => {
    const ce = capEff(t);
    const a = aroc(t);
    const pp = t.totalCredit>0 ? ((t.pnl/t.totalCredit)*100).toFixed(1) : '-';
    return `<div class="trade-row">
      <div class="trade-left">
        <div class="trade-ticker"><span class="badge ${badgeClass(t.type)}">${t.type}</span>${t.ticker} <span style="font-size:11px;font-weight:400;color:var(--text2)">$${t.strike}</span></div>
        <div class="trade-meta">${t.openDate} → ${t.closedDate||'?'} · ${t.dte}d</div>
        <div class="trade-meta" style="margin-top:2px">
          Cap eff: <span class="${ce!==null&&ce>=0?'pos':'neg'}">${ce!==null?ce.toFixed(2)+'%':'-'}</span>
          · AROC: <span class="pos">${a!==null?a.toFixed(1)+'%':'-'}</span>
        </div>
      </div>
      <div class="trade-right">
        <div class="trade-pnl ${(t.pnl||0)>=0?'pos':'neg'}">${(t.pnl||0)>=0?'+':''}$${(t.pnl||0).toFixed(2)}</div>
        <div class="trade-outcome"><span class="badge ${outcomeClass(t.outcome)}">${t.outcome}</span> ${pp}%</div>
      </div></div>`;
  }).join('') + '</div>';
}

load();
updateFilters();
renderDashboard();
</script>
</body>
</html>
